name: iOS Perf CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  NODE_VERSION: '22'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: makingshop156-web/ios-optimizer

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
        working-directory: ./backend
      - run: npx eslint src/
        working-directory: ./backend
        continue-on-error: true
      - run: echo "✓ Lint completed"

  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
        working-directory: ./backend
      - run: npm test
        working-directory: ./backend
        continue-on-error: true
      - name: Benchmark
        run: |
          node -e "
          const g = require('./generator');
          // Test profile generation
          console.log('Generator loaded: OK');
          console.log('Restrictions DB size:', Object.keys(g.RESTRICTIONS_DB || require('./backend/src/routes/restrictions')).length);
          "

  profile-validation:
    name: Validate Mobileconfig XML
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: |
          node -e "
          const fs = require('fs');
          const xml = fs.readFileSync('profiles/Performance.mobileconfig','utf8');
          // Check XML validity
          if(!xml.includes('<?xml')) throw new Error('Missing XML header');
          if(!xml.includes('</plist>')) throw new Error('Missing plist close');
          // Check escaped &
          if(xml.match(/<string>[^<]*&[^amp;lt;gt;quot;apos;][^<]*<\/string>/)) throw new Error('Unescaped & in string');
          // Check payload count
          const count = (xml.match(/PayloadDisplayName/g)||[]).length;
          console.log('✓ Profile valid: ' + count + ' payloads');
          "
      - run: echo "✓ Profile validation passed"

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, profile-validation]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.backend
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest,${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.frontend
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest,${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'release'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/ios-optimizer
            docker compose pull
            docker compose up -d --force-recreate
            docker system prune -f
            echo "✓ Deployed $(date)"

  pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: profile-validation
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
