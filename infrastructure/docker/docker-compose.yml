version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: iosperf-api
    ports:
      - "3100:3100"
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/iosperf.db
      - ADMIN_TOKEN=${ADMIN_TOKEN:-iosperf-admin-2026}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://iosperf.example.com}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - iosperf-net

  frontend:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.frontend
    container_name: iosperf-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - iosperf-net

  # Optional: Backup service
  backup:
    image: alpine:latest
    container_name: iosperf-backup
    volumes:
      - backend-data:/data:ro
      - ./backups:/backups
    entrypoint: |
      sh -c "
      apk add --no-cache sqlite;
      while true; do
        cp /data/iosperf.db /backups/iosperf-\$$(date +%Y%m%d-%H%M%S).db;
        find /backups -name 'iosperf-*.db' -mtime +30 -delete;
        sleep 86400;
      done"
    restart: unless-stopped
    networks:
      - iosperf-net

  # Optional: Monitoring
  monitor:
    image: nicolargo/glances:latest
    container_name: iosperf-monitor
    ports:
      - "61208:61208"
    restart: unless-stopped
    pid: host
    privileged: true
    networks:
      - iosperf-net

volumes:
  backend-data:
  backend-logs:

networks:
  iosperf-net:
    driver: bridge
